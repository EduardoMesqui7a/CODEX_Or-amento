services:
  - type: web
    name: orcamento-ia-api
    runtime: python
    rootDir: .
    plan: starter
    buildCommand: pip install -r apps/api/requirements.txt
    startCommand: uvicorn apps.api.src.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: API_PREFIX
        value: /api/v1
      - key: CELERY_TASK_ALWAYS_EAGER
        value: "true"
      - key: STORAGE_DIR
        value: ./storage
      - key: MAX_UPLOAD_SIZE_MB
        value: "30"
      - key: DATABASE_URL
        sync: false
      - key: CORS_ORIGINS
        sync: false

